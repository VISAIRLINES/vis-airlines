<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezerwacja — VIS Airlines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        /* NAV */
        .nav{height:auto;flex-direction:column;padding:0;gap:0}.nav.scrolled{height:auto}
        .nav-top{width:100%;display:flex;align-items:center;justify-content:flex-end;padding:0 48px;height:38px;background:rgba(4,10,20,.98);border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;gap:0}
        .nav-top-btn{background:none;border:none;color:var(--gray-300);font-size:12px;font-family:var(--font-body);padding:0 14px;height:38px;cursor:pointer;transition:color .2s;display:inline-flex;align-items:center;gap:5px;border-left:1px solid rgba(255,255,255,.06);text-decoration:none;white-space:nowrap}
        .nav-top-btn:first-child{border-left:none}.nav-top-btn:hover{color:var(--white)}.nav-top-btn.accent{color:var(--gold-500);font-weight:500}
        .nav-bottom{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:56px;border-bottom:1px solid rgba(255,255,255,.04)}

        /* PROGRESS BAR */
        .progress-bar{display:flex;align-items:center;justify-content:center;gap:0;padding:20px 48px;background:var(--navy-700);border-bottom:1px solid rgba(255,255,255,.04)}
        .progress-step{display:flex;align-items:center;gap:8px;padding:10px 20px;font-size:13px;color:var(--gray-500);font-weight:400;position:relative}
        .progress-step.active{color:var(--gold-500);font-weight:600}
        .progress-step.done{color:var(--green)}
        .progress-step-num{width:28px;height:28px;border-radius:50%;border:2px solid var(--gray-600);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--font-mono)}
        .progress-step.active .progress-step-num{border-color:var(--gold-500);color:var(--gold-500)}
        .progress-step.done .progress-step-num{border-color:var(--green);background:var(--green);color:var(--navy-800)}
        .progress-sep{width:40px;height:1px;background:var(--gray-600);margin:0 4px}

        /* MAIN */
        .booking-page{padding:32px 48px 80px;max-width:1100px;margin:0 auto}
        .step-title{font-family:var(--font-display);font-size:clamp(24px,3vw,36px);font-weight:600;margin-bottom:8px}
        .step-title .gold{color:var(--gold-500)}
        .step-subtitle{font-size:14px;color:var(--gray-400);margin-bottom:32px}

        /* DATE STRIP */
        .date-strip{display:flex;gap:0;margin-bottom:24px;overflow-x:auto;border-radius:var(--radius-md);border:1px solid rgba(255,255,255,.06);background:var(--navy-700)}
        .date-strip::-webkit-scrollbar{height:4px}.date-strip::-webkit-scrollbar-thumb{background:var(--gold-800);border-radius:2px}
        .date-strip-day{flex:1;min-width:90px;padding:12px 10px;text-align:center;cursor:pointer;border-right:1px solid rgba(255,255,255,.04);transition:all .2s;position:relative}
        .date-strip-day:last-child{border-right:none}
        .date-strip-day:hover{background:rgba(201,168,76,.05)}
        .date-strip-day.active{background:rgba(201,168,76,.1);border-bottom:3px solid var(--gold-500)}
        .date-strip-day.active .ds-price{color:var(--gold-400)}
        .date-strip-day.past{opacity:.3;cursor:default}
        .ds-weekday{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);font-weight:500}
        .ds-date{font-size:14px;font-weight:600;color:var(--white);margin:3px 0}
        .ds-price{font-size:12px;color:var(--gray-300);font-weight:500;font-family:var(--font-mono)}

        /* FLIGHT CARD (Lufthansa style) */
        .fc{background:var(--navy-700);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-md);margin-bottom:16px;overflow:hidden;transition:all .3s}
        .fc:hover{border-color:rgba(201,168,76,.15);box-shadow:0 12px 40px rgba(0,0,0,.25)}
        .fc-main{display:grid;grid-template-columns:1fr auto;min-height:90px}
        .fc-route-section{padding:20px 24px;display:flex;align-items:center;gap:20px}
        .fc-time{font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--white)}
        .fc-time-sub{font-size:11px;color:var(--gray-400)}
        .fc-arrow-block{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:90px}
        .fc-duration{font-size:11px;color:var(--gold-500);font-weight:600}
        .fc-line{width:100%;height:1px;background:var(--gray-500);position:relative}
        .fc-line::after{content:'✈';position:absolute;right:-2px;top:-9px;font-size:13px;color:var(--gold-500)}
        .fc-type{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:1px}
        .fc-classes{display:flex;border-left:1px solid rgba(255,255,255,.06)}
        .fc-class-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;min-width:140px;cursor:pointer;transition:all .2s;border-left:1px solid rgba(255,255,255,.06);position:relative}
        .fc-class-col:first-child{border-left:none}
        .fc-class-col:hover{background:rgba(201,168,76,.04)}
        .fc-class-col.selected{background:rgba(201,168,76,.08)}
        .fc-class-top{padding:16px 20px 12px;display:flex;flex-direction:column;align-items:center;width:100%;flex:1}
        .fc-class-name{font-size:14px;font-weight:600;color:var(--gray-200);margin-bottom:8px}
        .fc-class-col.selected .fc-class-name{color:var(--gold-500)}
        .fc-class-from{font-size:11px;color:var(--gray-500);margin-bottom:2px}
        .fc-class-price{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--white);line-height:1}
        .fc-class-col.selected .fc-class-price{color:var(--gold-400)}
        .fc-class-currency{font-size:12px;color:var(--gray-400);margin-top:3px}
        .fc-class-bottom{width:100%;padding:8px;border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--gray-500);transition:all .2s}
        .fc-class-col:hover .fc-class-bottom{color:var(--gold-500)}
        .fc-class-col.selected .fc-class-bottom{color:var(--gold-500);background:rgba(201,168,76,.06)}
        .fc-meta-bar{padding:10px 24px;border-top:1px solid rgba(255,255,255,.04);display:flex;gap:16px;font-size:12px;color:var(--gray-400);align-items:center;background:rgba(0,0,0,.1)}
        .fc-meta-item{display:flex;align-items:center;gap:4px}

        /* TARIFF GRID */
        .tariff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
        .tariff-card{background:var(--navy-700);border:2px solid rgba(255,255,255,.06);border-radius:var(--radius-md);overflow:hidden;transition:all .3s;cursor:pointer;display:flex;flex-direction:column}
        .tariff-card:hover{border-color:rgba(201,168,76,.2);transform:translateY(-2px)}
        .tariff-card.selected{border-color:var(--gold-500);box-shadow:0 0 0 1px var(--gold-500)}
        .tariff-card.recommended{border-color:var(--gold-600)}
        .tariff-header{padding:20px 20px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
        .tariff-price{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--white)}
        .tariff-card.selected .tariff-price{color:var(--gold-400)}
        .tariff-currency{font-size:14px;color:var(--gray-400);font-weight:400}
        .tariff-name{font-size:14px;font-weight:600;color:var(--gray-200);margin-top:8px}
        .tariff-card.selected .tariff-name{color:var(--gold-500)}
        .tariff-rec-badge{display:inline-block;padding:4px 12px;border-radius:var(--radius-full);background:var(--gold-600);color:var(--navy-800);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:6px}
        .tariff-features{padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:14px}
        .tariff-feature{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--gray-300);line-height:1.5}
        .tariff-feature-icon{font-size:14px;flex-shrink:0;margin-top:1px}
        .tariff-feature strong{color:var(--white);font-weight:500}
        .tariff-btn-wrap{padding:16px 20px;border-top:1px solid rgba(255,255,255,.04)}
        .tariff-btn{width:100%;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font-body);text-align:center}
        .tariff-btn-outline{background:none;border:1.5px solid rgba(255,255,255,.15);color:var(--gray-200)}
        .tariff-btn-outline:hover{border-color:var(--gold-500);color:var(--gold-500)}
        .tariff-card.selected .tariff-btn-outline{background:var(--gold-600);border-color:var(--gold-600);color:var(--navy-800)}

        /* SUMMARY CARD */
        .summary-card{background:var(--navy-700);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-md);padding:28px;margin-bottom:24px}
        .summary-card h3{font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:4px}
        .summary-card .route-date{font-size:13px;color:var(--gray-400);margin-bottom:20px}
        .summary-flight{display:flex;align-items:center;gap:24px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.04)}
        .summary-flight:last-child{border-bottom:none}
        .sf-time{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--white)}
        .sf-code{font-size:11px;color:var(--gray-400)}
        .sf-arrow{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:80px}
        .sf-arrow-line{width:60px;height:1px;background:var(--gray-500)}
        .sf-arrow-dur{font-size:10px;color:var(--gold-500);font-weight:500}
        .sf-details{font-size:12px;color:var(--gray-400);display:flex;flex-direction:column;gap:2px}
        .sf-tariff-badge{display:inline-block;padding:4px 12px;border-radius:var(--radius-full);font-size:11px;font-weight:600;margin-left:auto}
        .sf-tariff-eco{background:rgba(201,168,76,.1);color:var(--gold-500);border:1px solid rgba(201,168,76,.2)}
        .sf-tariff-biz{background:rgba(52,152,219,.1);color:var(--blue);border:1px solid rgba(52,152,219,.2)}
        .summary-total{display:flex;justify-content:flex-end;align-items:baseline;gap:8px;padding-top:20px;margin-top:12px;border-top:1px solid rgba(255,255,255,.06)}
        .summary-total-label{font-size:14px;color:var(--gray-400)}
        .summary-total-price{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--gold-500)}
        .summary-total-cur{font-size:14px;color:var(--gray-400)}

        /* PASSENGER FORM */
        .pax-form-section{background:var(--navy-700);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-md);padding:28px;margin-bottom:24px}
        .pax-form-section h3{font-family:var(--font-display);font-size:20px;font-weight:600;margin-bottom:4px}
        .pax-form-section .form-hint{font-size:12px;color:var(--gray-400);margin-bottom:24px}
        .pax-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .pax-form-grid .full{grid-column:span 2}
        .form-input-line{padding:14px 0 10px;border:none;border-bottom:2px solid rgba(255,255,255,.1);border-radius:0;background:transparent;color:var(--white);font-size:15px;font-family:var(--font-body);font-weight:300;outline:none;width:100%;transition:border-color .3s}
        .form-input-line:focus{border-bottom-color:var(--gold-500)}
        .form-input-line::placeholder{color:var(--gray-500)}
        .form-input-line.error{border-bottom-color:var(--red)}
        .form-error-text{font-size:11px;color:var(--red);margin-top:4px;display:none}
        .form-error-text.show{display:block}
        .form-select-line{padding:14px 0 10px;border:none;border-bottom:2px solid rgba(255,255,255,.1);border-radius:0;background:transparent;color:var(--white);font-size:15px;font-family:var(--font-body);font-weight:300;outline:none;width:100%;cursor:pointer;-webkit-appearance:none}
        .form-select-line:focus{border-bottom-color:var(--gold-500)}
        .form-select-line option{background:var(--navy-800);color:var(--white)}

        /* ACTION BAR */
        .action-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 0;margin-top:12px;gap:16px;flex-wrap:wrap}
        .action-bar-price{text-align:right}
        .action-bar-total{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--gold-500)}
        .action-bar-sub{font-size:12px;color:var(--gray-400)}

        /* EXTRAS SECTIONS */
        .extras-section{background:var(--navy-700);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-md);margin-bottom:20px;overflow:hidden}
        .extras-section-header{display:flex;align-items:center;gap:16px;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.04)}
        .extras-section-icon{font-size:28px;flex-shrink:0}
        .extras-section-title{font-size:16px;font-weight:600;color:var(--white)}
        .extras-section-desc{font-size:12px;color:var(--gray-400);margin-top:2px}
        .extras-options{padding:4px 0}

        /* Toggle item (on/off) */
        .extras-toggle{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;cursor:pointer;transition:background .2s;border-bottom:1px solid rgba(255,255,255,.02)}
        .extras-toggle:last-child{border-bottom:none}
        .extras-toggle:hover{background:rgba(255,255,255,.02)}
        .extras-toggle.active{background:rgba(201,168,76,.04)}
        .et-info{}
        .et-name{font-size:14px;font-weight:500;color:var(--white)}
        .et-desc{font-size:12px;color:var(--gray-400);margin-top:2px}
        .et-switch{flex-shrink:0;margin-left:16px}
        .et-switch-track{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;transition:background .2s}
        .extras-toggle.active .et-switch-track{background:var(--gold-600)}
        .et-switch-thumb{width:18px;height:18px;border-radius:50%;background:var(--white);position:absolute;top:3px;left:3px;transition:transform .2s}
        .extras-toggle.active .et-switch-thumb{transform:translateX(20px)}

        /* Counter item */
        .extras-counter{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.02)}
        .extras-counter:last-child{border-bottom:none}
        .et-counter{display:flex;align-items:center;gap:14px}
        .et-counter-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--gold-500);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font-body);transition:all .2s}
        .et-counter-btn:hover{background:rgba(201,168,76,.15);border-color:var(--gold-600)}
        .et-counter-val{font-family:var(--font-mono);font-size:16px;font-weight:600;color:var(--white);width:24px;text-align:center}

        /* Extras summary */
        .extras-summary{background:var(--navy-700);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-md);padding:20px 24px;margin-top:24px;margin-bottom:8px}
        .extras-summary-row{display:flex;justify-content:space-between;padding:10px 0;font-size:14px;color:var(--gray-300);border-bottom:1px solid rgba(255,255,255,.03)}
        .extras-summary-row:last-child{border-bottom:none}
        .extras-summary-total{font-size:18px;font-weight:700;color:var(--gold-500);padding-top:14px;margin-top:6px;border-top:2px solid rgba(201,168,76,.2) !important;border-bottom:none !important}

        /* Payment */
        .payment-box{background:var(--navy-700);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-md);padding:40px;text-align:center}
        .payment-box-icon{font-size:40px;margin-bottom:16px}
        .payment-box h3{font-family:var(--font-display);font-size:24px;font-weight:600;margin-bottom:8px}
        .payment-box p{font-size:14px;color:var(--gray-400);line-height:1.7;max-width:420px;margin:0 auto 20px}
        .payment-methods{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
        .pm-badge{padding:6px 14px;border-radius:4px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700;color:var(--white);letter-spacing:.5px}
        .payment-stripe-placeholder{border:2px dashed rgba(201,168,76,.2);border-radius:var(--radius-md);padding:40px;margin:0 auto;max-width:500px}
        .psp-inner{text-align:center}
        .psp-text{font-size:14px;color:var(--gray-400)}

        /* FOOTER (compact) */
        .footer{background:var(--navy-900);border-top:1px solid rgba(255,255,255,.06);padding:24px 48px}
        .footer-copy{font-size:12px;color:var(--gray-600);text-align:center}

        /* SEAT MAP */
        .seatmap-modal{position:fixed;inset:0;z-index:2000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
        .seatmap-modal.show{display:flex}
        .seatmap-box{background:var(--navy-700);border:1px solid rgba(201,168,76,.15);border-radius:var(--radius-lg);width:95%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
        .seatmap-header{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between}
        .seatmap-header h3{font-family:var(--font-display);font-size:20px;font-weight:600}
        .seatmap-close{background:none;border:none;color:var(--gray-400);font-size:22px;cursor:pointer;padding:4px 8px}
        .seatmap-close:hover{color:var(--white)}
        .seatmap-legend{padding:12px 24px;display:flex;gap:16px;font-size:11px;color:var(--gray-400);border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap}
        .seatmap-legend-item{display:flex;align-items:center;gap:6px}
        .seatmap-legend-dot{width:16px;height:16px;border-radius:3px}
        .seatmap-body{padding:20px 24px;overflow-y:auto;flex:1}
        .seatmap-plane{display:flex;flex-direction:column;align-items:center;gap:2px}
        .seatmap-row{display:flex;align-items:center;gap:0}
        .seatmap-rownum{width:28px;text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--gray-500);flex-shrink:0}
        .seatmap-seat{width:30px;height:30px;border-radius:4px;margin:1px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid transparent}
        .seat-available{background:rgba(46,204,113,.15);color:#2ecc71;border-color:rgba(46,204,113,.3)}
        .seat-available:hover{background:rgba(46,204,113,.3);transform:scale(1.1)}
        .seat-occupied{background:rgba(255,255,255,.05);color:var(--gray-600);cursor:default}
        .seat-selected{background:var(--gold-600) !important;color:var(--navy-800) !important;border-color:var(--gold-500) !important;transform:scale(1.1)}
        .seat-biz{background:rgba(52,152,219,.15);color:var(--blue);border-color:rgba(52,152,219,.3)}
        .seat-biz:hover{background:rgba(52,152,219,.3)}
        .seat-exit{border-color:rgba(231,76,60,.4) !important}
        .seat-aisle{width:20px;height:30px;margin:1px}
        .seatmap-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between}
        .seatmap-selected-info{font-size:14px;color:var(--gray-300)}
        .seatmap-selected-seat{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--gold-500)}

        @media(max-width:900px){
            .tariff-grid{grid-template-columns:1fr 1fr}
            .booking-page{padding:24px 16px 60px}
            .pax-form-grid{grid-template-columns:1fr}
            .pax-form-grid .full{grid-column:span 1}
            .progress-bar{padding:16px;overflow-x:auto}
            .fc-main{grid-template-columns:1fr}
            .fc-classes{border-left:none;border-top:1px solid rgba(255,255,255,.04)}
            .fc-class-col{min-width:0;padding:0}
            .date-strip-day{min-width:75px;padding:10px 6px}
        }
        @media(max-width:600px){
            .tariff-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <script src="js/nav.js"></script>
    <nav class="nav">
        <div class="nav-top">
            <button class="nav-top-btn">PL Polski ▾</button>
            <button class="nav-top-btn">PLN ▾</button>
            <a href="login.html" class="nav-top-btn">Zaloguj się</a>
            <a href="register.html" class="nav-top-btn accent">Załóż konto</a>
        </div>
        <div class="nav-bottom">
            <a href="index.html" class="nav-logo"><div class="nav-logo-mark">V</div><div class="nav-logo-text">VIS <em>Airlines</em></div></a>
        </div>
    </nav>

        // Find ALL return flights (there may be multiple)
        const returnFlights=ROUTES.filter(r=>r.from===flight.to && r.to===flight.from);

        /* ============ STEP 1: TARIFF ============ */

            }

            // Build ALL tariffs — eco + business
            const allTariffs=[];

            if(currentFlight.classes.economy){

                    const mult=TARIFF_MULTIPLIER[t.id]||1;
                    allTariffs.push({...t,price:Math.round(currentFlight.classes.economy*mult),classType:'economy'});

        function getPriceForDate(basePrice,date){
            const dow=date.getDay();
            if(dow===0||dow===6) return Math.round(basePrice*1.15);
            if(dow===2||dow===3) return Math.round(basePrice*0.90);
            return basePrice;
        }

            const MONTHS_S=['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];

                const d=new Date(retSelectedDate);
                d.setDate(d.getDate()+i);
                const isPast=d<minRetDate;

                    const rf=returnFlights[0];

                    <div class="ds-date">${d.getDate()} ${MONTHS_S[d.getMonth()]}</div>

                                </div>
                                <div class="fc-class-bottom">˅</div>
                            </div>

                                <div class="fc-route-section">

        function validateAndProceed(){
            let valid=true;
            // Clear errors
            document.querySelectorAll('.form-error-text').forEach(e=>e.classList.remove('show'));
            document.querySelectorAll('.form-input-line').forEach(e=>e.classList.remove('error'));

            // Passengers
            const paxInputs=document.querySelectorAll('[data-field]');
            paxInputs.forEach(inp=>{
                if(inp.tagName==='SELECT'){
                    if(!inp.value){inp.classList.add('error');valid=false;}
                } else {
                    if(!inp.value.trim()){
                        inp.classList.add('error');
                        const err=inp.parentElement.querySelector('.form-error-text');
                        if(err)err.classList.add('show');
                        valid=false;
                    }
                }
            });

            // Email
            const email=document.getElementById('pax-email');
            const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailRegex.test(email.value)){
                email.classList.add('error');
                document.getElementById('email-error').classList.add('show');
                valid=false;
            }

            // Phone
            const phone=document.getElementById('pax-phone');
            const phoneClean=phone.value.replace(/\s/g,'');
            if(!/^\d{7,15}$/.test(phoneClean)){
                phone.classList.add('error');
                document.getElementById('phone-error').classList.add('show');
                valid=false;
            }

            if(!valid){
                // Scroll to first error
                const firstErr=document.querySelector('.error');
                if(firstErr)firstErr.scrollIntoView({behavior:'smooth',block:'center'});
                return;
            }

            // Success → next step (services)
            step++;
            render();
        }

        /* ============ STEP: SERVICES ============ */
        /* ============ EXTRAS STATE ============ */
        let extras={seat:null,bag12:0,bag10:0,bag15:0,bag20:0,bag23:0,bag40:0,bagOversized:0,priority:false,fasttrack:false,lounge:false};

        const SEAT_CONFIGS={
            'Embraer 175-E2':{cols:['A','B','','C','D'],rows:22,biz:3,exitRows:[10,11]},

            if(extras.fasttrack) t+=EXTRAS_PRICES.fasttrack*totalPax;

        function openSeatMap(){
            const ac=flight.aircraft;
            const cfg=SEAT_CONFIGS[ac]||SEAT_CONFIGS['A321neo'];
            const cols=cfg.cols;
            const rows=cfg.rows;
            const bizRows=cfg.biz;
            const exitRows=cfg.exitRows||[];

            // Generate random occupied seats (30-50%)
            const occupied=new Set();
            const totalSeats=rows*cols.filter(c=>c!=='').length;
            const occCount=Math.floor(totalSeats*(.3+Math.random()*.2));
            for(let i=0;i<occCount;i++){
                const r=Math.floor(Math.random()*rows)+1;
                const c=cols.filter(c=>c!=='')[Math.floor(Math.random()*cols.filter(c=>c!=='').length)];
                occupied.add(r+c);
            }
            // Keep selected seat available
            if(extras.seat)occupied.delete(extras.seat);

            let modal=document.createElement('div');
            modal.className='seatmap-modal show';
            modal.innerHTML=`
                <div class="seatmap-box">
                    <div class="seatmap-header">
                        <h3>Wybierz miejsce · ${ac}</h3>
                        <button class="seatmap-close" id="sm-close">✕</button>
                    </div>
                    <div class="seatmap-legend">

                        <div class="seatmap-legend-item"><div class="seatmap-legend-dot seat-biz"></div> Business</div>
                        <div class="seatmap-legend-item"><div class="seatmap-legend-dot seat-occupied"></div> Zajęte</div>
                        <div class="seatmap-legend-item"><div class="seatmap-legend-dot seat-selected"></div> Twój wybór</div>
                    </div>
                    <div class="seatmap-body" id="sm-body"></div>
                    <div class="seatmap-footer">
                        <div><span class="seatmap-selected-info">Wybrane: </span><span class="seatmap-selected-seat" id="sm-selected">${extras.seat||'—'}</span></div>
                        <button class="btn btn-gold" id="sm-confirm" ${extras.seat?'':'disabled'}>Potwierdź — ${EXTRAS_PRICES.seat} PLN</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // Build seat rows
            const body=document.getElementById('sm-body');
            let html='<div class="seatmap-plane">';

            // Column headers
            html+='<div class="seatmap-row"><div class="seatmap-rownum"></div>';
            cols.forEach(c=>{
                if(c==='') html+='<div class="seat-aisle"></div>';
                else html+='<div class="seatmap-seat" style="background:none;cursor:default;font-size:11px;color:var(--gray-400);font-weight:600;">'+c+'</div>';
            });
            html+='</div>';

            for(let r=1;r<=rows;r++){
                html+='<div class="seatmap-row"><div class="seatmap-rownum">'+r+'</div>';
                cols.forEach(c=>{
                    if(c===''){html+='<div class="seat-aisle"></div>';return;}
                    const seatId=r+c;
                    const isBiz=r<=bizRows;
                    const isOcc=occupied.has(seatId);
                    const isSel=extras.seat===seatId;
                    const isExit=exitRows.includes(r);
                    let cls='seatmap-seat ';
                    if(isSel) cls+='seat-selected';
                    else if(isOcc) cls+='seat-occupied';
                    else if(isBiz) cls+='seat-biz';
                    else cls+='seat-available';
                    if(isExit&&!isOcc&&!isSel) cls+=' seat-exit';
                    html+='<div class="'+cls+'" data-seat="'+(isOcc&&!isSel?'':''+seatId)+'">'+(isSel?'✓':isOcc?'✕':c)+'</div>';
                });
                html+='</div>';
                // Exit row marker
                if(exitRows.includes(r)){
                    html+='<div style="width:100%;text-align:center;font-size:9px;color:var(--gray-500);padding:2px 0;letter-spacing:2px;">EXIT</div>';
                }
            }
            html+='</div>';
            body.innerHTML=html;

            // Seat click
            body.querySelectorAll('.seatmap-seat[data-seat]').forEach(s=>{
                if(!s.dataset.seat)return;
                s.addEventListener('click',()=>{
                    body.querySelectorAll('.seat-selected').forEach(p=>{
                        const isBiz2=parseInt(p.dataset.seat)<=bizRows;
                        p.className='seatmap-seat '+(isBiz2?'seat-biz':'seat-available');
                        p.textContent=p.dataset.seat.replace(/[0-9]/g,'');
                    });
                    s.className='seatmap-seat seat-selected';
                    s.textContent='✓';
                    document.getElementById('sm-selected').textContent=s.dataset.seat;
                    document.getElementById('sm-confirm').disabled=false;
                });
            });

            // Close
            document.getElementById('sm-close').addEventListener('click',()=>{modal.remove();});
            modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});

            // Confirm
            document.getElementById('sm-confirm').addEventListener('click',()=>{
                const sel=document.getElementById('sm-selected').textContent;
                if(sel&&sel!=='—'){
                    extras.seat=sel;
                    modal.remove();
                    renderServices();
                }
            });
        }

        function updateExtrasTotals(){
            const flightTotal=(outPrice+retPrice)*totalPax;
            const et=calcExtrasTotal();
            const gt=flightTotal+et;
            const ec=document.getElementById('extras-cost');
            const eg=document.getElementById('extras-grand');
            if(ec) ec.textContent=et>0?et.toLocaleString('pl-PL')+' PLN':'—';
            if(eg) eg.textContent=gt.toLocaleString('pl-PL')+' PLN';
        }

        /* ============ STEP: PAYMENT ============ */
        function renderPayment(){
            const flightTotal=(outPrice+retPrice)*totalPax;
            const extrasTotal=calcExtrasTotal();
            const grandTotal=flightTotal+extrasTotal;
            const user=fbAuth.currentUser;
            const allTariffsList=[...TARIFFS.economy,...TARIFFS.business];

            if(!user){
                app.innerHTML=`
                    <div style="text-align:center;padding:60px 20px;">
                        <div style="font-size:48px;margin-bottom:16px;">🔐</div>
                        <h2 class="step-title">Zaloguj się aby <span class="gold">zapłacić</span></h2>
                        <p style="color:var(--gray-400);margin-bottom:24px;">Musisz mieć konto żeby dokończyć rezerwację. Twoje dane są bezpieczne.</p>
                        <div style="display:flex;gap:12px;justify-content:center;">
                            <a href="login.html" class="btn btn-gold btn-lg">Zaloguj się</a>
                            <a href="register.html" class="btn btn-outline btn-lg" style="text-decoration:none;">Załóż konto</a>
                        </div>
                    </div>
                `;
                return;
            }

            app.innerHTML=`
                <h2 class="step-title">Płatność <span class="gold">bezpieczna</span></h2>
                <div class="step-subtitle">Finalizuj swoją rezerwację</div>

                <div class="extras-summary" style="margin-bottom:32px;">
                    <div class="extras-summary-row"><span>Loty (${totalPax} ${totalPax===1?'pasażer':'pasażerów'})</span><span>${flightTotal.toLocaleString('pl-PL')} PLN</span></div>
                    ${extrasTotal>0?`<div class="extras-summary-row"><span>Usługi dodatkowe</span><span>${extrasTotal.toLocaleString('pl-PL')} PLN</span></div>`:''}
                    <div class="extras-summary-row extras-summary-total"><span>Do zapłaty</span><span>${grandTotal.toLocaleString('pl-PL')} PLN</span></div>
                </div>

                <div class="payment-box">
                    <div class="payment-box-icon">🔒</div>
                    <h3>Płatność online — Stripe</h3>
                    <p>Po kliknięciu zostaniesz przekierowany na bezpieczną stronę płatności Stripe. Po opłaceniu rezerwacja zostanie potwierdzona automatycznie.</p>
                    <div class="payment-methods">
                        <span class="pm-badge">VISA</span>
                        <span class="pm-badge">Mastercard</span>
                        <span class="pm-badge">BLIK</span>
                        <span class="pm-badge">PayPo</span>
                        <span class="pm-badge">Klarna</span>
                    </div>
                    <button class="btn btn-gold btn-lg" style="width:100%;margin-top:20px;" id="pay-btn">Zapłać ${grandTotal.toLocaleString('pl-PL')} PLN</button>
                    <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--gray-500);">
                        Płatność obsługiwana przez Stripe. Klikając akceptujesz regulamin VIS Airlines.
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn btn-ghost" id="pay-back">← Wróć do usług dodatkowych</button>
                </div>
            `;

            document.getElementById('pay-back').addEventListener('click',()=>{step--;render();});

            document.getElementById('pay-btn').addEventListener('click',async()=>{
                const payBtn=document.getElementById('pay-btn');
                payBtn.disabled=true;payBtn.innerHTML='<span style="display:inline-block;width:20px;height:20px;border:2px solid rgba(10,22,40,.3);border-top-color:var(--navy-800);border-radius:50%;animation:spin .6s linear infinite;"></span> Przekierowanie do płatności...';

                const code=genCode();
                const route=flight.from+' → '+flight.to+(hasReturn&&selectedReturnFlight?' ↩ '+selectedReturnFlight.from+' → '+selectedReturnFlight.to:'');
                const booking={
                    code,
                    userId:user.uid,
                    userEmail:user.email,
                    userName:user.displayName||'',
                    from:flight.from,
                    to:flight.to,
                    flightId:flight.id,
                    dep:flight.dep,
                    arr:flight.arr,
                    duration:flight.duration,
                    aircraft:flight.aircraft,
                    date:dateStr,
                    tariff:allTariffsList.find(t=>t.id===outTariff)?.name||'',
                    outPrice,
                    pax:totalPax,
                    adults,children,infants,
                    extras:JSON.parse(JSON.stringify(extras)),
                    extrasTotal:calcExtrasTotal(),
                    totalPrice:grandTotal,
                    status:'pending',
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                };

                if(hasReturn&&selectedReturnFlight){
                    booking.returnFrom=selectedReturnFlight.from;
                    booking.returnTo=selectedReturnFlight.to;
                    booking.returnFlightId=selectedReturnFlight.id;
                    booking.returnDep=selectedReturnFlight.dep;
                    booking.returnArr=selectedReturnFlight.arr;
                    booking.returnTariff=allTariffsList.find(t=>t.id===retTariff)?.name||'';
                    booking.retPrice=retPrice;
                }

                try{
                    // 1. Save booking to Firestore as pending
                    await fbDb.collection('bookings').add(booking);

                    // 2. Call Vercel to create Stripe Checkout session
                    const resp=await fetch('https://vis-payments.vercel.app/api/checkout',{
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            amount:grandTotal*100, // Stripe uses grosze (cents)
                            bookingCode:code,
                            route:route,
                            email:user.email
                        })
                    });

                    const data=await resp.json();

                    if(data.url){
                        // 3. Redirect to Stripe Checkout
                        window.location.href=data.url;
                    }else{
                        throw new Error(data.error||'Błąd tworzenia sesji płatności');
                    }
                }catch(e){
                    console.error(e);
                    payBtn.disabled=false;
                    payBtn.textContent='Spróbuj ponownie';
                    alert('Błąd: '+e.message);
                }
            });
        }

        function renderConfirmation(code,total){
            app.innerHTML=`
                <div style="text-align:center;padding:60px 20px;">
                    <div style="font-size:64px;margin-bottom:20px;">✅</div>
                    <h2 style="font-family:var(--font-display);font-size:32px;font-weight:700;color:#2ecc71;margin-bottom:8px;">Rezerwacja potwierdzona!</h2>
                    <p style="color:var(--gray-400);margin-bottom:24px;">Twój kod rezerwacji:</p>
                    <div style="font-family:var(--font-mono);font-size:40px;font-weight:700;color:var(--gold-500);letter-spacing:6px;margin-bottom:8px;">${code}</div>
                    <p style="color:var(--gray-400);font-size:14px;margin-bottom:8px;">Łączna kwota: <strong style="color:var(--white);">${total.toLocaleString('pl-PL')} PLN</strong></p>
                    <p style="color:var(--gray-400);font-size:13px;margin-bottom:40px;">Rezerwacja została zapisana na Twoim koncie. Możesz ją zobaczyć w panelu „Zarządzaj rezerwacją".</p>
                    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
                        <a href="rezerwacje.html" class="btn btn-gold btn-lg" style="text-decoration:none;">Moje rezerwacje</a>
                        <a href="index.html" class="btn btn-outline btn-lg" style="text-decoration:none;">Strona główna</a>
                    </div>
                </div>
            `;
            // Hide progress bar
            document.getElementById('progress').style.display='none';
        }

        /* ============ RENDER ============ */
        function render(){
            renderProgress();
            window.scrollTo({top:0,behavior:'smooth'});

            if(step===1) renderTariffs('out');
            else if(step===2 && hasReturn) renderReturnFlights();
            else if(step===3 && hasReturn) renderTariffs('return');
            else if((step===2 && !hasReturn)||(step===4 && hasReturn)) renderSummary();
            else if((step===3 && !hasReturn)||(step===5 && hasReturn)) renderPassengerForm();
            else if((step===4 && !hasReturn)||(step===6 && hasReturn)) renderServices();
            else renderPayment();
        }

        render();
    })();
    </script>
</body>
</html>
