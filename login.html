<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaloguj się — VIS Airlines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <style>
        .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.06) 0%,transparent 50%),var(--navy-800)}
        .auth-card{background:var(--navy-700);border:1px solid rgba(201,168,76,.15);border-radius:var(--radius-lg);padding:48px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
        .auth-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
        .auth-logo-mark{width:44px;height:44px;border:2px solid var(--gold-600);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--gold-500)}
        .auth-logo-text{font-family:var(--font-display);font-size:24px;font-weight:600;color:var(--white)}
        .auth-logo-text em{font-style:normal;color:var(--gold-500)}
        .auth-card h2{font-family:var(--font-display);font-size:28px;text-align:center;margin-bottom:8px;font-weight:600}
        .auth-card .subtitle{text-align:center;color:var(--gray-400);font-size:14px;margin-bottom:32px}
        .auth-form{display:flex;flex-direction:column;gap:20px}
        .auth-input{padding:16px;border-radius:var(--radius-sm);background:var(--navy-900);border:1px solid rgba(255,255,255,.08);color:var(--white);font-size:15px;font-family:var(--font-body);font-weight:300;outline:none;width:100%;transition:border-color .3s}
        .auth-input:focus{border-color:var(--gold-600)}
        .auth-input::placeholder{color:var(--gray-500)}
        .auth-btn{width:100%;padding:16px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;font-family:var(--font-body);border:none;background:linear-gradient(135deg,var(--gold-600),var(--gold-500));color:var(--navy-800);text-align:center}
        .auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,168,76,.35)}
        .auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .auth-switch{text-align:center;margin-top:24px;font-size:14px;color:var(--gray-400)}
        .auth-switch a{color:var(--gold-500);text-decoration:none;font-weight:600}
        .auth-switch a:hover{text-decoration:underline}
        .auth-error{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25);color:#e74c3c;padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;display:none}
        .auth-error.show{display:block}
        .auth-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(10,22,40,.3);border-top-color:var(--navy-800);border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-mark">V</div>
                <div class="auth-logo-text">VIS <em>Airlines</em></div>
            </div>
            <h2>Witaj ponownie</h2>
            <p class="subtitle">Zaloguj się do konta VIS Airlines</p>
            <div class="auth-error" id="error-msg"></div>
            <div class="auth-form">
                <input class="auth-input" type="email" placeholder="Adres e-mail" id="email" autocomplete="email">
                <input class="auth-input" type="password" placeholder="Hasło" id="password" autocomplete="current-password">
                <button class="auth-btn" id="login-btn">Zaloguj się</button>
            </div>
            <div style="text-align:center;margin-top:12px;">
                <a href="#" id="forgot-btn" style="font-size:13px;color:var(--gold-500);text-decoration:none;">Nie pamiętam hasła</a>
            </div>
            <div class="auth-success" id="success-msg" style="display:none;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2);color:#2ecc71;padding:12px 16px;border-radius:8px;font-size:13px;margin-top:12px;text-align:center;"></div>
            <div class="auth-switch">
                Nie masz konta? <a href="register.html">Zarejestruj się</a>
            </div>
            <div style="text-align:center;margin-top:16px;">
                <a href="index.html" style="font-size:13px;color:var(--gray-500);text-decoration:none;">← Wróć na stronę główną</a>
            </div>
        </div>
    </div>

    <script>
    firebase.initializeApp({
        apiKey:"AIzaSyBhn5Tv3iUCBYczQhfYnlHEjBIBDlPk0HQ",
        authDomain:"vis-airlines-b1677.firebaseapp.com",
        projectId:"vis-airlines-b1677",
        storageBucket:"vis-airlines-b1677.firebasestorage.app",
        messagingSenderId:"159896846581",
        appId:"1:159896846581:web:f7b41f69945004599e05bc"
    });
    const auth=firebase.auth();

    // If already logged in, redirect
    auth.onAuthStateChanged(u=>{if(u)window.location.href='rezerwacje.html';});

    const btn=document.getElementById('login-btn');
    const errEl=document.getElementById('error-msg');

    function showError(msg){errEl.textContent=msg;errEl.classList.add('show');}
    function hideError(){errEl.classList.remove('show');}

    btn.addEventListener('click',async()=>{
        hideError();
        const email=document.getElementById('email').value.trim();
        const pass=document.getElementById('password').value;
        if(!email||!pass){showError('Wypełnij wszystkie pola.');return;}
        btn.disabled=true;btn.innerHTML='<span class="auth-spinner"></span>';
        try{
            await auth.signInWithEmailAndPassword(email,pass);
            window.location.href='rezerwacje.html';
        }catch(e){
            const msgs={'auth/user-not-found':'Nie znaleziono konta z tym e-mailem.','auth/wrong-password':'Nieprawidłowe hasło.','auth/invalid-email':'Nieprawidłowy format e-mail.','auth/invalid-credential':'Nieprawidłowy e-mail lub hasło.'};
            showError(msgs[e.code]||'Błąd logowania. Spróbuj ponownie.');
            btn.disabled=false;btn.textContent='Zaloguj się';
        }
    });

    // Enter key
    document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});

    // Forgot password
    document.getElementById('forgot-btn').addEventListener('click',async(e)=>{
        e.preventDefault();
        hideError();
        const email=document.getElementById('email').value.trim();
        if(!email){showError('Wpisz adres e-mail, a potem kliknij „Nie pamiętam hasła".');return;}
        try{
            await auth.sendPasswordResetEmail(email);
            const suc=document.getElementById('success-msg');
            suc.textContent='Link do zmiany hasła został wysłany na '+email+'. Sprawdź skrzynkę pocztową.';
            suc.style.display='block';
        }catch(e){
            const msgs={'auth/user-not-found':'Nie znaleziono konta z tym e-mailem.','auth/invalid-email':'Nieprawidłowy format e-mail.'};
            showError(msgs[e.code]||'Błąd wysyłania. Spróbuj ponownie.');
        }
    });
    </script>
</body>
</html>
